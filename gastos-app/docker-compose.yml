version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gastos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gastos_app
    ports:
      - "5432:5432"
    volumes:
      - gastos_pgdata:/var/lib/postgresql/data

volumes:
  gastos_pgdata:
